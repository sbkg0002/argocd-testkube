# ArgoCD PostSync resource hook — GATING.
#
# When helm-guestbook syncs (deploy or update), ArgoCD applies this Job and
# WAITS for it: ArgoCD natively tracks Job health, so if the Job fails the
# PostSync hook fails and the whole sync is marked Failed. The Job runs the
# hello-service-up workflow with `-f`, which streams logs and exits non-zero if
# the test fails — so a down/unhealthy guestbook Service fails the deploy.
#
# generateName -> a fresh, uniquely-named Job per sync (re-runs every time).
# hook-delete-policy: HookSucceeded -> successful runs are cleaned up; FAILED
# runs are kept so you can inspect their logs.
#
# This assumes a self-hosted (OSS / standalone agent) Testkube reachable
# in-cluster at the API server Service. Adjust TESTKUBE_API_URI to match your
# install (service name / namespace / port). For Testkube Cloud, replace the
# TESTKUBE_API_URI env with a `testkube set context --api-key ... --org-id ...
# --env-id ...` call before the run command.
apiVersion: batch/v1
kind: Job
metadata:
  generateName: hello-service-up-postsync-
  namespace: testkube
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: run-hello-service-up
          image: kubeshop/testkube-cli:2.1.19
          env:
            # `direct` talks to the API server over HTTP via TESTKUBE_API_URI.
            # Without it the CLI defaults to the `proxy` client, which needs a
            # kubeconfig the hook pod doesn't have ("no configuration has been
            # provided ... KUBERNETES_MASTER").
            - name: TESTKUBE_API_URI
              value: http://testkube-api-server.testkube.svc.cluster.local:8088
          command:
            - /bin/sh
            - -c
            - |
              set -e
              testkube --client direct run testworkflow hello-service-up -f
